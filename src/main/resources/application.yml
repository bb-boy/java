# Spring Boot应用配置文件（YAML格式）
# YAML是一种数据序列化语言，比XML、JSON更简洁
# 使用缩进表示层级关系，注意：必须使用空格，不能使用Tab

spring:
  application:
    name: wave-data-viewer

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Shanghai

  datasource:
    url: jdbc:mysql://localhost:3306/wavedb?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: devroot
    
  h2:
    console:
      enabled: false
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  kafka:
    bootstrap-servers: localhost:19092,localhost:29092,localhost:39092
    
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      batch-size: 16384
      linger-ms: 10
      compression-type: snappy
      
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false

    listener:
      ack-mode: manual

logging:
  level:
    root: INFO
    com.example.kafka: DEBUG
    org.apache.kafka: WARN
    org.springframework.kafka: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

server:
  port: 8080

app:
  kafka:
    group-id: ecrh-projection-group

  derivation:
    output-root: /home/pl/java/data/derived

  waveform:
    max-points: 50000

  influxdb:
    enabled: true
    url: http://localhost:8086
    token: my-super-secret-token
    org: wavedata
    bucket: waveforms
