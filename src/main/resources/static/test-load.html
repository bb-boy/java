<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>测试页面</title>
</head>
<body>
    <h1>API测试</h1>
    <div id="result"></div>
    <script>
        const API_BASE = 'http://localhost:8080/api/hybrid';
        
        async function testAPIs() {
            const result = document.getElementById('result');
            result.innerHTML = '<p>测试中...</p>';
            
            try {
                // 测试1: 炮号列表
                const shotsRes = await fetch(`${API_BASE}/shots`);
                const shots = await shotsRes.json();
                result.innerHTML += `<p>✅ 炮号列表: ${shots.length}个 - ${shots.slice(0, 5).join(', ')}...</p>`;
                
                // 测试2: 炮号1数据
                const shot1Res = await fetch(`${API_BASE}/shot/1`);
                const shot1 = await shot1Res.json();
                result.innerHTML += `<p>✅ 炮号1数据: ${shot1.channelCount}个通道</p>`;
                
                // 测试3: 时间线
                const timelineRes = await fetch(`${API_BASE}/timeline/1`);
                const timeline = await timelineRes.json();
                result.innerHTML += `<p>✅ 时间线: ${timeline.events.length}个事件, ${timeline.waveforms.length}个波形</p>`;
                
                // 测试4: 波形
                const waveRes = await fetch(`${API_BASE}/waveform?shotNo=1&channelName=NegVoltage`);
                const wave = await waveRes.json();
                result.innerHTML += `<p>✅ 波形数据: ${wave.samples}个采样点</p>`;
                
                result.innerHTML += `<p><strong>✅ 所有API正常！</strong></p>`;
                result.innerHTML += `<p><a href="/">返回主页</a></p>`;
                
            } catch (error) {
                result.innerHTML += `<p style="color:red">❌ 错误: ${error.message}</p>`;
            }
        }
        
        testAPIs();
    </script>
</body>
</html>
