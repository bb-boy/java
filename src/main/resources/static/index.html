<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波形数据展示系统 - 简化版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; padding: 20px; background: #f0f2f5; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
        select, button { padding: 8px 16px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #1890ff; color: white; cursor: pointer; border: none; }
        button:hover { background: #40a9ff; }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .content-grid { display: grid; grid-template-columns: 250px 1fr; gap: 20px; }
        .metadata { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .meta-item { padding: 10px; background: #fafafa; border-radius: 4px; }
        .meta-item label { display: block; color: #666; font-size: 12px; }
        .meta-item span { display: block; color: #333; font-size: 16px; font-weight: bold; margin-top: 4px; }
        .channel-list { background: #fafafa; border-radius: 4px; padding: 10px; max-height: 500px; overflow-y: auto; }
        .channel-list h3 { margin-bottom: 10px; font-size: 14px; color: #666; }
        .chart { width: 100%; height: 400px; border: 1px solid #ddd; }
        .loading { text-align: center; padding: 40px; color: #999; }
        .error { color: red; padding: 10px; background: #fff1f0; border-radius: 4px; margin-top: 10px; }
        .event-list { background: #fafafa; border-radius: 4px; padding: 10px; max-height: 280px; overflow-y: auto; border: 1px solid #eee; }
        .event-item { padding: 8px; border-bottom: 1px solid #eee; cursor: pointer; transition: background 0.2s; }
        .event-item:hover { background: #f0f0f0; }
        .event-item.selected { background: #e6f7ff; border-left: 3px solid #1890ff; }
        .event-detail { margin-top: 10px; padding: 10px; background: #fff; border: 1px solid #eee; border-radius: 4px; font-size: 12px; color: #555; }
        .event-detail .detail-row { margin-bottom: 6px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .stat-item { padding: 8px; background: #fafafa; border-radius: 4px; font-size: 12px; }
        #debug { margin-top: 20px; padding: 10px; background: #f5f5f5; border-radius: 4px; font-size: 12px; max-height: 200px; overflow-y: auto; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>波形数据展示系统</h1>
            <div class="controls">
                <label>炮号:</label>
                <select id="shotSelector"></select>
                
                <label>通道类型:</label>
                <select id="typeSelector">
                    <option value="Tube">Tube</option>
                    <option value="Water">Water</option>
                </select>
                
                <button onclick="loadData()">加载数据</button>
                <button onclick="clearDebug()">清空日志</button>
            </div>
            <div id="status"></div>
        </div>

        <div class="card">
            <h2>炮号元数据</h2>
            <div id="metadata" class="metadata">
                <div class="loading">等待加载...</div>
            </div>
        </div>

        <div class="card">
            <h2 id="chartTitle">波形数据</h2>
            <div class="content-grid">
                <div class="channel-list">
                    <h3>通道列表</h3>
                    <div id="channelList">
                        <p style="color:#999; font-size:12px;">请选择炮号加载数据</p>
                    </div>
                </div>
                <div id="chart" class="chart"></div>
            </div>
        </div>

        <div class="card">
            <h2>频谱分析</h2>
            <div id="spectrum" class="chart" style="height: 300px;"></div>
            <div id="waveStats" class="stats-grid"></div>
        </div>

        <div class="card">
            <h2>保护事件</h2>
            <div id="protectionList" class="event-list">
                <div class="loading">等待加载...</div>
            </div>
            <div id="protectionDetail" class="event-detail">选择事件查看详情</div>
        </div>

        <div class="card">
            <h2>操作日志时间线</h2>
            <div id="timeline" class="chart" style="height: 300px;"></div>
        </div>

        <div class="card">
            <h3>调试日志</h3>
            <div id="debug"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api/hybrid';  // 使用混合API (MySQL + InfluxDB)
        const ECRH_API_BASE = 'http://localhost:8080/api/ecrh';
        const DEFAULT_WINDOW_BEFORE_MS = 100;
        const DEFAULT_WINDOW_AFTER_MS = 200;
        const DEFAULT_SPECTRUM_WINDOW_MS = 100;
        const MILLIS_PER_SECOND = 1000;
        const PAD_TWO = 2;
        const PAD_THREE = 3;
        let chart = null;
        let timelineChart = null;
        let spectrumChart = null;
        let lastMetadata = null;
        let currentChannel = null;
        let currentDataType = null;
        let protectionEvents = [];

        function log(message) {
            const debugEl = document.getElementById('debug');
            const time = new Date().toLocaleTimeString();
            debugEl.innerHTML += `[${time}] ${message}<br>`;
            debugEl.scrollTop = debugEl.scrollHeight;
            console.log(message);
        }

        function clearDebug() {
            document.getElementById('debug').innerHTML = '';
        }

        function showError(message) {
            document.getElementById('status').innerHTML = `<div class="error">❌ ${message}</div>`;
            log(`ERROR: ${message}`);
        }

        function initChart() {
            try {
                chart = echarts.init(document.getElementById('chart'));
                chart.setOption({
                    title: { text: '等待数据...', left: 'center' },
                    tooltip: { trigger: 'axis' },
                    xAxis: { type: 'category', name: '采样点' },
                    yAxis: { type: 'value', name: '数值' },
                    series: []
                });
                
                timelineChart = echarts.init(document.getElementById('timeline'));
                timelineChart.setOption({
                    title: { text: '等待加载...', left: 'center', textStyle: { fontSize: 14 } },
                    tooltip: { trigger: 'item' },
                    xAxis: { type: 'time', name: '时间' },
                    yAxis: { type: 'category', data: ['操作'] },
                    series: []
                });

                spectrumChart = echarts.init(document.getElementById('spectrum'));
                spectrumChart.setOption({
                    title: { text: '等待频谱数据...', left: 'center', textStyle: { fontSize: 14 } },
                    tooltip: { trigger: 'axis' },
                    xAxis: { type: 'value', name: '频率 (Hz)' },
                    yAxis: { type: 'value', name: '幅值' },
                    series: []
                });
                
                log('✅ 图表初始化成功');
            } catch (error) {
                showError('图表初始化失败: ' + error.message);
            }
        }

        async function loadShots() {
            try {
                log('正在加载炮号列表...');
                const response = await fetch(`${API_BASE}/shots`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const shots = await response.json();
                log(`✅ 获取到 ${shots.length} 个炮号`);
                
                const selector = document.getElementById('shotSelector');
                selector.innerHTML = shots.map(s => 
                    `<option value="${s}">${s}</option>`
                ).join('');
                
                if (shots.length > 0) {
                    loadData();
                }
            } catch (error) {
                showError('加载炮号列表失败: ' + error.message);
            }
        }

        async function loadData() {
            const shotNo = document.getElementById('shotSelector').value;
            const dataType = document.getElementById('typeSelector').value;
            
            if (!shotNo) {
                showError('请选择炮号');
                return;
            }

            try {
                log(`正在加载炮号 ${shotNo} 的数据...`);
                document.getElementById('status').innerHTML = '<div>⏳ 加载中，请稍候...</div>';
                
                // 使用混合API加载数据
                const response = await fetch(`${API_BASE}/shots/${shotNo}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                log(`✅ 数据加载成功: ${data.channelCount} 个通道`);
                
                // 显示元数据
                displayMetadata(data.metadata);
                lastMetadata = data.metadata || null;
                currentDataType = dataType;
                
                // 加载操作日志时间线
                loadTimeline(shotNo);
                loadProtectionEvents(shotNo);
                
                // 过滤并显示波形
                const filteredChannels = data.channels.filter(ch => ch.dataType === dataType);
                log(`✅ 找到 ${filteredChannels.length} 个 ${dataType} 通道`);
                
                if (filteredChannels.length > 0) {
                    // 更新通道列表并加载第一个通道
                    updateChannelList(filteredChannels, shotNo);
                    const firstChannel = filteredChannels[0].channelName;
                    log(`正在从InfluxDB加载通道: ${firstChannel}...`);
                    loadWaveform(shotNo, firstChannel, dataType, filteredChannels);
                } else {
                    document.getElementById('channelList').innerHTML = '<p style="color:#999">无可用通道</p>';
                    showError(`没有找到${dataType}类型的通道`);
                }
                
                document.getElementById('status').innerHTML = '<div style="color:green">✅ 加载完成</div>';
            } catch (error) {
                showError('加载数据失败: ' + error.message);
            }
        }
        
        async function loadWaveform(shotNo, channelName, dataType, allChannels) {
            try {
                currentChannel = channelName;
                if (dataType) {
                    currentDataType = dataType;
                }
                // 同时获取波形数据和操作日志时间范围
                const [waveResponse, timelineResponse] = await Promise.all([
                    fetch(`${API_BASE}/waveform?shotNo=${shotNo}&channelName=${encodeURIComponent(channelName)}`),
                    fetch(`${API_BASE}/timeline/${shotNo}`)
                ]);
                
                if (!waveResponse.ok) throw new Error(`HTTP ${waveResponse.status}`);
                
                const waveData = await waveResponse.json();
                const timelineData = timelineResponse.ok ? await timelineResponse.json() : null;
                
                log(`✅ 波形数据加载成功: ${waveData.samples} 个采样点`);
                
                // 传递操作日志时间范围给显示函数
                displayWaveformFromInflux(waveData, allChannels, timelineData);
                loadDefaultSpectrum(shotNo, channelName, currentDataType);
            } catch (error) {
                showError('加载波形失败: ' + error.message);
            }
        }

        function updateChannelList(channels, shotNo) {
            const html = channels.map((ch, index) => `
                <div class="channel-item" onclick="loadWaveform(${shotNo}, '${ch.channelName.replace(/'/g, "\\'")}', '${ch.dataType}')"
                     style="padding:8px; cursor:pointer; border-bottom:1px solid #eee; transition:background 0.2s;"
                     onmouseover="this.style.background='#f0f0f0'"
                     onmouseout="this.style.background='white'">
                    <div style="font-weight:bold; color:#333">${ch.channelName}</div>
                    <div style="font-size:12px; color:#666">采样点: ${ch.samples || 'N/A'}</div>
                </div>
            `).join('');
            
            document.getElementById('channelList').innerHTML = html;
            log(`✅ 通道列表已更新: ${channels.length} 个通道`);
        }

        function displayMetadata(metadata) {
            if (!metadata) {
                log('⚠️ 无元数据');
                return;
            }
            
            const html = `
                <div class="meta-item">
                    <label>炮号</label>
                    <span>${metadata.shotNo}</span>
                </div>
                <div class="meta-item">
                    <label>开始时间</label>
                    <span>${metadata.startTime || '-'}</span>
                </div>
                <div class="meta-item">
                    <label>采样率</label>
                    <span>${metadata.sampleRate || '-'} Hz</span>
                </div>
                <div class="meta-item">
                    <label>状态</label>
                    <span>${metadata.status || '-'}</span>
                </div>
                <div class="meta-item">
                    <label>样本数</label>
                    <span>${metadata.totalSamples || '-'}</span>
                </div>
                <div class="meta-item">
                    <label>时长</label>
                    <span>${metadata.actualDuration || '-'}s</span>
                </div>
            `;
            
            document.getElementById('metadata').innerHTML = html;
            log('✅ 元数据显示完成');
        }

        function displayWaveformFromInflux(waveData, allChannels, timelineData) {
            if (!waveData || !waveData.data || waveData.data.length === 0) {
                log('⚠️ 无波形数据');
                chart.setOption({
                    title: { text: '波形数据 (无数据)' },
                    series: []
                });
                return;
            }
            
            // 准备时间轴数据
            let xAxisData = [];
            let xAxisType = 'category';
            let xAxisName = '采样点';
            
            // 如果有操作日志时间范围，使用操作日志的时间区间
            if (timelineData && timelineData.events && timelineData.events.length > 0) {
                // 获取操作日志的时间范围
                const eventTimes = timelineData.events.map(e => new Date(e.timestamp).getTime());
                const logStartTime = Math.min(...eventTimes);
                const logEndTime = Math.max(...eventTimes);
                const logDuration = logEndTime - logStartTime;
                
                // 计算波形数据的总时长（基于采样点数量）
                const waveCount = waveData.data.length;
                
                // 将波形数据均匀分布在操作日志的时间区间内
                xAxisData = waveData.data.map((_, i) => {
                    return logStartTime + (logDuration * i / (waveCount - 1));
                });
                
                xAxisType = 'time';
                xAxisName = '时间';
                log(`✅ 使用操作日志时间区间: ${new Date(logStartTime).toLocaleTimeString()} - ${new Date(logEndTime).toLocaleTimeString()}`);
            } else if (waveData.timestamps && waveData.timestamps.length > 0) {
                // 回退：使用波形自带的时间戳
                const timeData = waveData.timestamps.map((ts, i) => ({
                    time: new Date(ts).getTime(),
                    value: waveData.data[i],
                    timestamp: ts
                }));
                
                timeData.sort((a, b) => a.time - b.time);
                xAxisData = timeData.map(d => d.time);
                const sortedValues = timeData.map(d => d.value);
                waveData.data = sortedValues;
                
                xAxisType = 'time';
                xAxisName = '时间';
            } else {
                // 否则使用采样点索引
                xAxisData = waveData.data.map((_, i) => i);
            }
            
            // 显示单个通道的波形
            const option = {
                title: { 
                    text: `波形数据 - ${waveData.channelName} (来自InfluxDB) - ${waveData.samples}个采样点`,
                    left: 'center'
                },
                tooltip: {
                    trigger: 'axis',
                    formatter: function(params) {
                        if (xAxisType === 'time') {
                            const time = new Date(params[0].value[0]);
                            const timeStr = time.toLocaleString('zh-CN', {
                                hour: '2-digit',
                                minute: '2-digit',
                                second: '2-digit',
                                fractionalSecondDigits: 3
                            });
                            return `时间: ${timeStr}<br/>` +
                                   `数值: ${params[0].value[1].toFixed(6)}`;
                        } else {
                            return `采样点: ${params[0].dataIndex}<br/>` +
                                   `数值: ${params[0].data.toFixed(6)}`;
                        }
                    }
                },
                toolbox: {
                    feature: {
                        dataZoom: { yAxisIndex: 'none' },
                        restore: {},
                        saveAsImage: {}
                    }
                },
                dataZoom: [{
                    type: 'inside',
                    start: 0,
                    end: 100
                }, {
                    start: 0,
                    end: 100
                }],
                xAxis: { 
                    type: xAxisType,
                    name: xAxisName,
                    data: xAxisType === 'category' ? xAxisData : undefined,
                    axisLabel: xAxisType === 'time' ? {
                        formatter: function(value) {
                            const date = new Date(value);
                            return date.toLocaleTimeString('zh-CN', { 
                                hour: '2-digit', 
                                minute: '2-digit',
                                second: '2-digit'
                            });
                        }
                    } : undefined
                },
                yAxis: { 
                    type: 'value',
                    name: '数值'
                },
                series: [{
                    name: waveData.channelName,
                    type: 'line',
                    data: xAxisType === 'time' ? 
                        xAxisData.map((time, i) => [time, waveData.data[i]]) : 
                        waveData.data,
                    sampling: 'lttb',
                    lineStyle: { width: 1 },
                    symbol: 'none'
                }]
            };
            
            chart.setOption(option);
            log(`✅ 波形显示完成: ${waveData.samples}个点 ${xAxisType === 'time' ? '(使用时间轴)' : '(使用采样点)'}`);
            
            // 高亮当前选中的通道
            document.querySelectorAll('.channel-item').forEach(item => {
                if (item.textContent.includes(waveData.channelName)) {
                    item.style.background = '#e3f2fd';
                    item.style.borderLeft = '3px solid #2196F3';
                } else {
                    item.style.background = 'white';
                    item.style.borderLeft = 'none';
                }
            });
        }

        async function loadProtectionEvents(shotNo) {
            try {
                log(`正在加载炮号 ${shotNo} 的保护事件...`);
                const response = await fetch(`${ECRH_API_BASE}/protection-events?shotNo=${shotNo}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const events = await response.json();
                protectionEvents = Array.isArray(events) ? events : [];
                renderProtectionEvents(protectionEvents);
                renderProtectionDetail(null);
                log(`✅ 保护事件加载完成: ${protectionEvents.length} 条`);
            } catch (error) {
                log(`⚠️ 保护事件加载失败: ${error.message}`);
                renderProtectionEvents([]);
                renderProtectionDetail(null);
            }
        }

        function renderProtectionEvents(events) {
            const listEl = document.getElementById('protectionList');
            if (!events || events.length === 0) {
                listEl.innerHTML = '<div class="loading">暂无保护事件</div>';
                return;
            }
            const html = events.map((event, idx) => {
                const time = formatShortTime(event.triggerTime);
                const level = event.severity || 'N/A';
                const name = event.interlockName || '事件';
                const action = event.actionTaken ? ` - ${event.actionTaken}` : '';
                return `
                    <div class="event-item" onclick="selectProtectionEvent(${idx})">
                        <div><b>${name}</b> <span style="color:#999">(${level})${action}</span></div>
                        <div style="font-size:12px; color:#666;">${time}</div>
                    </div>
                `;
            }).join('');
            listEl.innerHTML = html;
        }

        function selectProtectionEvent(index) {
            const event = protectionEvents[index];
            if (!event) return;
            highlightProtectionEvent(index);
            renderProtectionDetail(event);
            if (!currentChannel || !currentDataType) {
                showError('请先选择通道后再回放保护事件');
                return;
            }
            const windowStart = event.windowStart || shiftTime(event.triggerTime, -DEFAULT_WINDOW_BEFORE_MS);
            const windowEnd = event.windowEnd || shiftTime(event.triggerTime, DEFAULT_WINDOW_AFTER_MS);
            if (!windowStart || !windowEnd) {
                showError('保护事件缺少窗口时间');
                return;
            }
            loadWaveformWindow(event.shotNo, currentChannel, currentDataType, windowStart, windowEnd, event.triggerTime);
        }

        function highlightProtectionEvent(index) {
            const items = document.querySelectorAll('.event-item');
            items.forEach((item, idx) => {
                item.classList.toggle('selected', idx === index);
            });
        }

        function renderProtectionDetail(event) {
            const detailEl = document.getElementById('protectionDetail');
            if (!event) {
                detailEl.innerHTML = '选择事件查看详情';
                return;
            }
            const rows = [
                `<div class="detail-row"><b>触发时间:</b> ${formatShortTime(event.triggerTime)}</div>`,
                `<div class="detail-row"><b>级别:</b> ${event.severity || 'N/A'}</div>`,
                `<div class="detail-row"><b>动作:</b> ${event.actionTaken || 'N/A'}</div>`,
                `<div class="detail-row"><b>条件:</b> ${event.triggerCondition || 'N/A'}</div>`,
                `<div class="detail-row"><b>测量:</b> ${formatNumber(event.measuredValue)} / 阈值: ${formatNumber(event.thresholdValue)}</div>`
            ];
            detailEl.innerHTML = rows.join('');
        }

        async function loadWaveformWindow(shotNo, channelName, dataType, startTime, endTime, triggerTime) {
            try {
                const params = new URLSearchParams({
                    shotNo: String(shotNo),
                    channelName,
                    dataType,
                    start: startTime,
                    end: endTime
                });
                const response = await fetch(`${ECRH_API_BASE}/waveform/window?${params.toString()}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                displayWaveformWindow(data, triggerTime);
                updateWaveStats(data.stats);
                await loadSpectrum(shotNo, channelName, dataType, startTime, endTime);
            } catch (error) {
                showError('加载波形窗口失败: ' + error.message);
            }
        }

        function displayWaveformWindow(result, triggerTime) {
            if (!result || !result.values || result.values.length === 0) {
                chart.setOption({ title: { text: '窗口波形 (无数据)' }, series: [] }, true);
                return;
            }
            const sampleRate = result.sampleRate || null;
            const values = result.values;
            const useTimeAxis = sampleRate && sampleRate > 0;
            const xData = values.map((_, i) => useTimeAxis
                ? (i * MILLIS_PER_SECOND / sampleRate)
                : i
            );
            const seriesData = useTimeAxis
                ? xData.map((x, i) => [x, values[i]])
                : values;
            const markLine = buildTriggerMarkLine(triggerTime, result.startTime, sampleRate);

            chart.setOption({
                title: { text: `窗口波形 - ${result.channelName}`, left: 'center' },
                tooltip: { trigger: 'axis' },
                xAxis: { type: useTimeAxis ? 'value' : 'category', name: useTimeAxis ? '时间 (ms)' : '采样点' },
                yAxis: { type: 'value', name: '数值' },
                series: [{
                    name: result.channelName,
                    type: 'line',
                    data: seriesData,
                    symbol: 'none',
                    lineStyle: { width: 1 },
                    markLine
                }]
            }, true);
        }

        function buildTriggerMarkLine(triggerTime, windowStart, sampleRate) {
            if (!triggerTime || !windowStart || !sampleRate) {
                return undefined;
            }
            const triggerMs = diffMillis(windowStart, triggerTime);
            if (triggerMs === null) {
                return undefined;
            }
            return {
                data: [{ xAxis: triggerMs }],
                lineStyle: { color: '#fa541c', width: 2 },
                label: { formatter: '触发', position: 'insideEndTop' }
            };
        }

        function updateWaveStats(stats) {
            const statsEl = document.getElementById('waveStats');
            if (!stats) {
                statsEl.innerHTML = '';
                return;
            }
            statsEl.innerHTML = `
                <div class="stat-item">最小值: ${formatNumber(stats.min)}</div>
                <div class="stat-item">最大值: ${formatNumber(stats.max)}</div>
                <div class="stat-item">RMS: ${formatNumber(stats.rms)}</div>
                <div class="stat-item">峰峰值: ${formatNumber(stats.peakToPeak)}</div>
            `;
        }

        async function loadSpectrum(shotNo, channelName, dataType, startTime, endTime) {
            try {
                const params = new URLSearchParams({
                    shotNo: String(shotNo),
                    channelName,
                    dataType,
                    start: startTime,
                    end: endTime
                });
                const response = await fetch(`${ECRH_API_BASE}/waveform/spectrum?${params.toString()}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                displaySpectrum(data);
            } catch (error) {
                log(`⚠️ 频谱加载失败: ${error.message}`);
                spectrumChart.setOption({ title: { text: '频谱加载失败' }, series: [] }, true);
            }
        }

        function displaySpectrum(result) {
            if (!result || !result.frequencies || !result.magnitudes) {
                spectrumChart.setOption({ title: { text: '频谱 (无数据)' }, series: [] }, true);
                return;
            }
            const seriesData = result.frequencies.map((f, i) => [f, result.magnitudes[i]]);
            spectrumChart.setOption({
                title: { text: `频谱 - ${result.channelName}`, left: 'center' },
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'value', name: '频率 (Hz)' },
                yAxis: { type: 'value', name: '幅值' },
                series: [{
                    name: result.channelName,
                    type: 'line',
                    data: seriesData,
                    symbol: 'none',
                    lineStyle: { width: 1 }
                }]
            }, true);
        }

        function loadDefaultSpectrum(shotNo, channelName, dataType) {
            if (!lastMetadata || !lastMetadata.startTime) {
                return;
            }
            const startTime = normalizeDateTime(lastMetadata.startTime);
            const endTime = shiftTime(startTime, DEFAULT_SPECTRUM_WINDOW_MS);
            if (!startTime || !endTime) {
                return;
            }
            loadSpectrum(shotNo, channelName, dataType, startTime, endTime);
        }

        function shiftTime(baseTime, offsetMs) {
            const date = parseLocalDateTime(baseTime);
            if (!date) return null;
            const shifted = new Date(date.getTime() + offsetMs);
            return formatLocalDateTime(shifted);
        }

        function diffMillis(startTime, endTime) {
            const startDate = parseLocalDateTime(startTime);
            const endDate = parseLocalDateTime(endTime);
            if (!startDate || !endDate) return null;
            return endDate.getTime() - startDate.getTime();
        }

        function parseLocalDateTime(value) {
            if (!value) return null;
            if (value instanceof Date) return value;
            const normalized = value.includes('T') ? value : value.replace(' ', 'T');
            const date = new Date(normalized);
            return isNaN(date.getTime()) ? null : date;
        }

        function normalizeDateTime(value) {
            const date = parseLocalDateTime(value);
            return date ? formatLocalDateTime(date) : null;
        }

        function formatLocalDateTime(date) {
            const pad2 = (num) => String(num).padStart(PAD_TWO, '0');
            const pad3 = (num) => String(num).padStart(PAD_THREE, '0');
            const year = date.getFullYear();
            const month = pad2(date.getMonth() + 1);
            const day = pad2(date.getDate());
            const hour = pad2(date.getHours());
            const minute = pad2(date.getMinutes());
            const second = pad2(date.getSeconds());
            const ms = pad3(date.getMilliseconds());
            return `${year}-${month}-${day} ${hour}:${minute}:${second}.${ms}`;
        }

        function formatShortTime(value) {
            const date = parseLocalDateTime(value);
            if (!date) return value || '-';
            return date.toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function formatNumber(value) {
            if (value === null || value === undefined) return 'N/A';
            return Number(value).toFixed(3);
        }
        
        // 颜色映射函数：基于delta值
        function getColorByDelta(delta) {
            if (delta === null || delta === undefined) return '#1890ff';
            if (delta > 0) return '#ff4d4f';  // 红色 - 参数增加
            if (delta < 0) return '#52c41a';  // 绿色 - 参数减少
            return '#1890ff';  // 蓝色 - 无变化
        }

        // 大小映射函数：基于delta绝对值和最大变化量
        function getSizeByDelta(delta, maxAbsDelta) {
            const minSize = 10;
            const maxSize = 40;
            if (!delta || !maxAbsDelta || maxAbsDelta === 0) return minSize;
            const normalizedSize = Math.abs(delta) / maxAbsDelta;
            return minSize + (maxSize - minSize) * normalizedSize;
        }

        // 格式化变化量显示
        function formatDelta(delta) {
            if (delta === null || delta === undefined) return 'N/A';
            const sign = delta > 0 ? '+' : '';
            return `${sign}${delta.toFixed(3)}`;
        }

        // 格式化百分比显示
        function formatPercent(percent) {
            if (percent === null || percent === undefined) return 'N/A';
            const sign = percent > 0 ? '+' : '';
            return `${sign}${percent.toFixed(2)}%`;
        }
        
        async function loadTimeline(shotNo) {
            try {
                log(`正在加载炮号 ${shotNo} 的操作日志时间线...`);
                const response = await fetch(`${API_BASE}/timeline/${shotNo}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                log(`✅ 加载到 ${data.totalEvents} 个操作事件`);
                
                if (data.totalEvents === 0) {
                    timelineChart.setOption({
                        title: { text: `炮号 ${shotNo} - 无操作日志`, left: 'center', textStyle: { fontSize: 14 } },
                        xAxis: { type: 'time', show: false },
                        yAxis: { show: false },
                        series: []
                    }, true);
                    return;
                }
                
                // 计算最大变化量用于大小归一化
                const deltas = data.events.map(event => Math.abs(event.delta || 0));
                const maxAbsDelta = Math.max(...deltas, 0.001); // 确保不为0
                log(`✅ 最大变化量: ${maxAbsDelta}`);
                
                // 准备增强的时间线数据
                const timelineData = data.events.map(event => ({
                    name: event.operation || '操作',
                    value: [
                        event.timestamp,
                        0,
                        event.channelName || '',
                        event.stepType || '',
                        event.oldValue,
                        event.newValue,
                        event.delta,
                        event.changePercent
                    ],
                    // 直接在数据项中设置样式
                    itemStyle: {
                        color: getColorByDelta(event.delta)
                    },
                    symbolSize: getSizeByDelta(event.delta, maxAbsDelta)
                }));
                
                const option = {
                    title: { 
                        text: `操作日志时间线 - 炮号 ${shotNo} (共${data.totalEvents}个事件)`,
                        left: 'center',
                        textStyle: { fontSize: 14 }
                    },
                    legend: {
                        data: ['参数增加', '参数减少', '无变化'],
                        left: 'left',
                        top: 'top',
                        itemGap: 15,
                        textStyle: { fontSize: 12 }
                    },
                    tooltip: {
                        trigger: 'item',
                        formatter: function(params) {
                            const d = params.data;
                            const [timestamp, , channelName, stepType, oldValue, newValue, delta, changePercent] = d.value;
                            const time = new Date(timestamp).toLocaleTimeString('zh-CN', {
                                hour: '2-digit',
                                minute: '2-digit',
                                second: '2-digit'
                            });
                            
                            return `<b>${d.name}</b><br/>` +
                                   `通道: ${channelName || 'N/A'}<br/>` +
                                   `时间: ${time}<br/>` +
                                   `操作: ${stepType || 'N/A'}<br/>` +
                                   `修改前: ${oldValue !== null ? oldValue.toFixed(3) : 'N/A'}<br/>` +
                                   `修改后: ${newValue !== null ? newValue.toFixed(3) : 'N/A'}<br/>` +
                                   `变化量: ${formatDelta(delta)}<br/>` +
                                   `变化率: ${formatPercent(changePercent)}`;
                        }
                    },
                    grid: {
                        left: '10%',
                        right: '10%',
                        bottom: '15%',
                        top: '15%'
                    },
                    xAxis: {
                        type: 'time',
                        name: '时间',
                        axisLabel: {
                            formatter: function(value) {
                                const date = new Date(value);
                                return date.toLocaleTimeString('zh-CN', { 
                                    hour: '2-digit', 
                                    minute: '2-digit',
                                    second: '2-digit'
                                });
                            }
                        }
                    },
                    yAxis: {
                        type: 'category',
                        data: ['操作事件'],
                        axisLabel: { show: false }
                    },
                    dataZoom: [
                        {
                            type: 'inside',
                            xAxisIndex: 0,
                            start: 0,
                            end: 100,
                            zoomOnMouseWheel: true,
                            moveOnMouseMove: true
                        },
                        {
                            type: 'slider',
                            xAxisIndex: 0,
                            start: 0,
                            end: 100,
                            height: 20
                        }
                    ],
                    series: [
                        {
                            name: '参数增加',
                            type: 'scatter',
                            data: timelineData.filter(d => d.value[6] > 0),
                            itemStyle: { color: '#ff4d4f' },
                            symbolSize: function(value) {
                                return getSizeByDelta(value[6], maxAbsDelta);
                            },
                            label: {
                                show: true,
                                position: 'top',
                                formatter: function(params) {
                                    return params.data.name;
                                },
                                fontSize: 10
                            }
                        },
                        {
                            name: '参数减少',
                            type: 'scatter',
                            data: timelineData.filter(d => d.value[6] < 0),
                            itemStyle: { color: '#52c41a' },
                            symbolSize: function(value) {
                                return getSizeByDelta(value[6], maxAbsDelta);
                            },
                            label: {
                                show: true,
                                position: 'top',
                                formatter: function(params) {
                                    return params.data.name;
                                },
                                fontSize: 10
                            }
                        },
                        {
                            name: '无变化',
                            type: 'scatter',
                            data: timelineData.filter(d => !d.value[6] || d.value[6] === 0),
                            itemStyle: { color: '#1890ff' },
                            symbolSize: 10,
                            label: {
                                show: true,
                                position: 'top',
                                formatter: function(params) {
                                    return params.data.name;
                                },
                                fontSize: 10
                            }
                        }
                    ]
                };
                
                timelineChart.setOption(option);
                log('✅ 操作日志时间线显示完成 - 使用增强可视化');
            } catch (error) {
                log(`⚠️ 加载时间线失败: ${error.message}`);
                timelineChart.setOption({
                    title: { 
                        text: `炮号 ${shotNo} - 暂无操作日志`,
                        left: 'center',
                        textStyle: { fontSize: 14, color: '#999' }
                    }
                });
            }
        }

        // 页面加载时初始化
        window.addEventListener('load', () => {
            log('=== 页面加载完成 ===');
            log('初始化图表...');
            initChart();
            log('加载炮号列表...');
            loadShots();
        });

        // 窗口大小改变时重绘
        window.addEventListener('resize', () => {
            if (chart) chart.resize();
            if (timelineChart) timelineChart.resize();
            if (spectrumChart) spectrumChart.resize();
        });
    </script>
</body>
</html>
