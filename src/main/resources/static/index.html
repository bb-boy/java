<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波形数据展示系统 - 简化版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; padding: 20px; background: #f0f2f5; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
        select, button { padding: 8px 16px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #1890ff; color: white; cursor: pointer; border: none; }
        button:hover { background: #40a9ff; }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .content-grid { display: grid; grid-template-columns: 250px 1fr; gap: 20px; }
        .metadata { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .meta-item { padding: 10px; background: #fafafa; border-radius: 4px; }
        .meta-item label { display: block; color: #666; font-size: 12px; }
        .meta-item span { display: block; color: #333; font-size: 16px; font-weight: bold; margin-top: 4px; }
        .channel-list { background: #fafafa; border-radius: 4px; padding: 10px; max-height: 500px; overflow-y: auto; }
        .channel-list h3 { margin-bottom: 10px; font-size: 14px; color: #666; }
        .chart { width: 100%; height: 400px; border: 1px solid #ddd; }
        .loading { text-align: center; padding: 40px; color: #999; }
        .error { color: red; padding: 10px; background: #fff1f0; border-radius: 4px; margin-top: 10px; }
        #debug { margin-top: 20px; padding: 10px; background: #f5f5f5; border-radius: 4px; font-size: 12px; max-height: 200px; overflow-y: auto; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>波形数据展示系统</h1>
            <div class="controls">
                <label>炮号:</label>
                <select id="shotSelector"></select>
                
                <label>通道类型:</label>
                <select id="typeSelector">
                    <option value="Tube">Tube</option>
                    <option value="Water">Water</option>
                </select>
                
                <button onclick="loadData()">加载数据</button>
                <button onclick="clearDebug()">清空日志</button>
            </div>
            <div id="status"></div>
        </div>

        <div class="card">
            <h2>炮号元数据</h2>
            <div id="metadata" class="metadata">
                <div class="loading">等待加载...</div>
            </div>
        </div>

        <div class="card">
            <h2 id="chartTitle">波形数据</h2>
            <div class="content-grid">
                <div class="channel-list">
                    <h3>通道列表</h3>
                    <div id="channelList">
                        <p style="color:#999; font-size:12px;">请选择炮号加载数据</p>
                    </div>
                </div>
                <div id="chart" class="chart"></div>
            </div>
        </div>

        <div class="card">
            <h2>操作日志时间线（含3通道波形）</h2>
            <div id="timeline" class="chart" style="height: 500px;"></div>
        </div>

        <div class="card">
            <h3>调试日志</h3>
            <div id="debug"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api/hybrid';  // 使用混合API (MySQL + InfluxDB)
        let chart = null;
        let timelineChart = null;

        function log(message) {
            const debugEl = document.getElementById('debug');
            const time = new Date().toLocaleTimeString();
            debugEl.innerHTML += `[${time}] ${message}<br>`;
            debugEl.scrollTop = debugEl.scrollHeight;
            console.log(message);
        }

        function clearDebug() {
            document.getElementById('debug').innerHTML = '';
        }

        function showError(message) {
            document.getElementById('status').innerHTML = `<div class="error">❌ ${message}</div>`;
            log(`ERROR: ${message}`);
        }

        function initChart() {
            try {
                chart = echarts.init(document.getElementById('chart'));
                chart.setOption({
                    title: { text: '等待数据...', left: 'center' },
                    tooltip: { trigger: 'axis' },
                    xAxis: { type: 'category', name: '采样点' },
                    yAxis: { type: 'value', name: '数值' },
                    series: []
                });
                
                timelineChart = echarts.init(document.getElementById('timeline'));
                timelineChart.setOption({
                    title: { text: '等待加载...', left: 'center', textStyle: { fontSize: 14 } },
                    tooltip: { trigger: 'item' },
                    xAxis: { type: 'time', name: '时间' },
                    yAxis: { type: 'category', data: ['操作'] },
                    series: []
                });
                
                log('✅ 图表初始化成功');
            } catch (error) {
                showError('图表初始化失败: ' + error.message);
            }
        }

        async function loadShots() {
            try {
                log('正在加载炮号列表...');
                const response = await fetch(`${API_BASE}/shots`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const shots = await response.json();
                log(`✅ 获取到 ${shots.length} 个炮号`);
                
                const selector = document.getElementById('shotSelector');
                selector.innerHTML = shots.map(s => 
                    `<option value="${s}">${s}</option>`
                ).join('');
                
                // 自动选择第一个炮号并加载数据
                if (shots.length > 0) {
                    selector.value = shots[0];
                    log(`✅ 自动选择炮号 ${shots[0]}`);
                    loadData();
                }
            } catch (error) {
                showError('加载炮号列表失败: ' + error.message);
            }
        }

        async function loadData() {
            const shotNo = document.getElementById('shotSelector').value;
            const dataType = document.getElementById('typeSelector').value;
            
            if (!shotNo) {
                showError('请选择炮号');
                return;
            }

            try {
                log(`正在加载炮号 ${shotNo} 的数据...`);
                document.getElementById('status').innerHTML = '<div>⏳ 加载中，请稍候...</div>';
                
                // 使用混合API加载数据
                const response = await fetch(`${API_BASE}/shot/${shotNo}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                log(`✅ 数据加载成功: ${data.channelCount} 个通道`);
                
                // 显示元数据
                displayMetadata(data.metadata);
                
                // 加载操作日志时间线
                loadTimeline(shotNo);
                
                // 过滤并显示波形
                const filteredChannels = data.channels.filter(ch => ch.dataType === dataType);
                log(`✅ 找到 ${filteredChannels.length} 个 ${dataType} 通道`);
                
                if (filteredChannels.length > 0) {
                    // 更新通道列表并加载第一个通道
                    updateChannelList(filteredChannels, shotNo);
                    const firstChannel = filteredChannels[0].channelName;
                    log(`正在从InfluxDB加载通道: ${firstChannel}...`);
                    loadWaveform(shotNo, firstChannel, filteredChannels);
                } else {
                    document.getElementById('channelList').innerHTML = '<p style="color:#999">无可用通道</p>';
                    showError(`没有找到${dataType}类型的通道`);
                }
                
                document.getElementById('status').innerHTML = '<div style="color:green">✅ 加载完成</div>';
            } catch (error) {
                showError('加载数据失败: ' + error.message);
            }
        }
        
        async function loadWaveform(shotNo, channelName, allChannels) {
            try {
                const response = await fetch(`${API_BASE}/waveform?shotNo=${shotNo}&channelName=${encodeURIComponent(channelName)}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const waveData = await response.json();
                log(`✅ 波形数据加载成功: ${waveData.samples} 个采样点`);
                
                displayWaveformFromInflux(waveData, allChannels);
            } catch (error) {
                showError('加载波形失败: ' + error.message);
            }
        }

        function updateChannelList(channels, shotNo) {
            const html = channels.map((ch, index) => `
                <div class="channel-item" onclick="loadWaveform(${shotNo}, '${ch.channelName.replace(/'/g, "\\'")}')"
                     style="padding:8px; cursor:pointer; border-bottom:1px solid #eee; transition:background 0.2s;"
                     onmouseover="this.style.background='#f0f0f0'"
                     onmouseout="this.style.background='white'">
                    <div style="font-weight:bold; color:#333">${ch.channelName}</div>
                    <div style="font-size:12px; color:#666">采样点: ${ch.samples || 'N/A'}</div>
                </div>
            `).join('');
            
            document.getElementById('channelList').innerHTML = html;
            log(`✅ 通道列表已更新: ${channels.length} 个通道`);
        }

        function displayMetadata(metadata) {
            if (!metadata) {
                log('⚠️ 无元数据');
                return;
            }
            
            const html = `
                <div class="meta-item">
                    <label>炮号</label>
                    <span>${metadata.shotNo}</span>
                </div>
                <div class="meta-item">
                    <label>开始时间</label>
                    <span>${metadata.startTime || '-'}</span>
                </div>
                <div class="meta-item">
                    <label>采样率</label>
                    <span>${metadata.sampleRate || '-'} Hz</span>
                </div>
                <div class="meta-item">
                    <label>状态</label>
                    <span>${metadata.status || '-'}</span>
                </div>
                <div class="meta-item">
                    <label>样本数</label>
                    <span>${metadata.totalSamples || '-'}</span>
                </div>
                <div class="meta-item">
                    <label>时长</label>
                    <span>${metadata.actualDuration || '-'}s</span>
                </div>
            `;
            
            document.getElementById('metadata').innerHTML = html;
            log('✅ 元数据显示完成');
        }

        function displayWaveformFromInflux(waveData, allChannels) {
            if (!waveData || !waveData.data || waveData.data.length === 0) {
                log('⚠️ 无波形数据');
                chart.setOption({
                    title: { text: '波形数据 (无数据)' },
                    series: []
                });
                return;
            }
            
            // 显示单个通道的波形
            const option = {
                title: { 
                    text: `波形数据 - ${waveData.channelName} (来自InfluxDB)`,
                    left: 'center'
                },
                tooltip: {
                    trigger: 'axis',
                    formatter: function(params) {
                        return `采样点: ${params[0].dataIndex}<br/>` +
                               `数值: ${params[0].data.toFixed(6)}`;
                    }
                },
                toolbox: {
                    feature: {
                        dataZoom: { yAxisIndex: 'none' },
                        restore: {},
                        saveAsImage: {}
                    }
                },
                dataZoom: [{
                    type: 'inside',
                    start: 0,
                    end: 100
                }, {
                    start: 0,
                    end: 100
                }],
                xAxis: { 
                    type: 'category',
                    name: '采样点',
                    data: waveData.data.map((_, i) => i)
                },
                yAxis: { 
                    type: 'value',
                    name: '数值'
                },
                series: [{
                    name: waveData.channelName,
                    type: 'line',
                    data: waveData.data,
                    sampling: 'lttb',
                    lineStyle: { width: 1 },
                    symbol: 'none'
                }]
            };
            
            chart.setOption(option);
            log(`✅ 波形显示完成: ${waveData.samples}个点`);
            
            // 高亮当前选中的通道
            document.querySelectorAll('.channel-item').forEach(item => {
                if (item.textContent.includes(waveData.channelName)) {
                    item.style.background = '#e3f2fd';
                    item.style.borderLeft = '3px solid #2196F3';
                } else {
                    item.style.background = 'white';
                    item.style.borderLeft = 'none';
                }
            });
        }
        
        async function loadTimeline(shotNo) {
            try {
                log(`正在加载炮号 ${shotNo} 的时间线...`);
                const response = await fetch(`${API_BASE}/timeline/${shotNo}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                log(`✅ 加载到 ${data.events.length} 个操作事件，${data.waveforms ? data.waveforms.length : 0} 个波形通道`);
                
                if (data.events.length === 0 && (!data.waveforms || data.waveforms.length === 0)) {
                    timelineChart.setOption({
                        title: { text: `炮号 ${shotNo} - 无数据`, left: 'center', textStyle: { fontSize: 14 } }
                    });
                    return;
                }
                
                // 构建ECharts配置
                const option = {
                    title: { 
                        text: `操作日志时间线 - 炮号 ${shotNo} (${data.events.length}个操作)`,
                        left: 'center',
                        textStyle: { fontSize: 14 }
                    },
                    tooltip: {
                        trigger: 'axis',
                        axisPointer: { type: 'cross' }
                    },
                    legend: {
                        data: [],
                        top: 30,
                        type: 'scroll'
                    },
                    grid: {
                        left: '8%',
                        right: '5%',
                        bottom: '15%',
                        top: '15%'
                    },
                    xAxis: {
                        type: 'time',
                        name: '时间'
                    },
                    yAxis: {
                        type: 'value',
                        name: '数值',
                        scale: true
                    },
                    dataZoom: [
                        { type: 'slider', xAxisIndex: 0, start: 0, end: 100, height: 20 },
                        { type: 'inside', xAxisIndex: 0 }
                    ],
                    series: []
                };
                
                // 添加波形线系列
                const colors = ['#1890ff', '#52c41a', '#faad14'];
                if (data.waveforms && data.waveforms.length > 0) {
                    data.waveforms.forEach((waveform, idx) => {
                        const waveformData = waveform.timestamps.map((time, i) => [
                            new Date(time).getTime(),
                            waveform.values[i]
                        ]);
                        
                        // 准备该通道的操作标记
                        const channelEvents = data.events.filter(e => 
                            e.channelName === waveform.channel || idx === 0  // 第一个通道显示所有事件
                        );
                        
                        const markPoints = channelEvents.map(event => ({
                            name: event.channelName,
                            coord: [new Date(event.timestamp).getTime(), event.newValue || 0],
                            value: event.action,
                            symbol: 'pin',
                            symbolSize: 10,
                            itemStyle: {
                                color: event.color === 'red' ? '#f5222d' : 
                                       event.color === 'green' ? '#52c41a' : '#1890ff'
                            },
                            label: { show: false },
                            tooltip: {
                                formatter: () => {
                                    const time = new Date(event.timestamp).toLocaleString('zh-CN');
                                    return `时间: ${time}<br/>` +
                                           `通道: ${event.channelName}<br/>` +
                                           `操作: <b style="color:${event.color === 'red' ? '#f5222d' : event.color === 'green' ? '#52c41a' : '#1890ff'}">${event.action}</b><br/>` +
                                           `旧值: ${event.oldValue != null ? event.oldValue.toFixed(4) : 'N/A'}<br/>` +
                                           `新值: ${event.newValue != null ? event.newValue.toFixed(4) : 'N/A'}<br/>` +
                                           `变化: ${event.delta != null ? (event.delta > 0 ? '+' : '') + event.delta.toFixed(4) : 'N/A'}`;
                                }
                            }
                        }));
                        
                        option.legend.data.push(waveform.channelName);
                        option.series.push({
                            name: waveform.channelName,
                            type: 'line',
                            data: waveformData,
                            sampling: 'lttb',
                            lineStyle: { width: 1.5, color: colors[idx % colors.length] },
                            areaStyle: {
                                color: {
                                    type: 'linear',
                                    x: 0, y: 0, x2: 0, y2: 1,
                                    colorStops: [
                                        { offset: 0, color: colors[idx % colors.length] + '30' },
                                        { offset: 1, color: colors[idx % colors.length] + '05' }
                                    ]
                                }
                            },
                            symbol: 'none',
                            smooth: true,
                            z: 1,
                            markPoint: { data: markPoints }
                        });
                        
                        log(`✅ ${waveform.channelName}: ${waveform.samples}个采样点`);
                    });
                }
                
                timelineChart.setOption(option);
                log('✅ 时间线显示完成');
            } catch (error) {
                log(`⚠️ 加载时间线失败: ${error.message}`);
                timelineChart.setOption({
                    title: { 
                        text: `炮号 ${shotNo} - 加载失败`,
                        left: 'center',
                        textStyle: { fontSize: 14, color: '#999' }
                    }
                });
            }
        }
            try {
                log(`正在加载炮号 ${shotNo} 的时间线 (通道: ${channel}, 类型: ${dataType})...`);
                const response = await fetch(`${API_BASE}/timeline/${shotNo}?channel=${channel}&dataType=${dataType}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                log(`✅ 加载到 ${data.totalEvents} 个操作事件`);
                
                if (data.totalEvents === 0 && !data.waveform) {
                    timelineChart.setOption({
                        title: { text: `炮号 ${shotNo} - 无数据`, left: 'center', textStyle: { fontSize: 14 } }
                    });
                    return;
                }
                
                // 准备操作事件散点数据（带颜色标记）
                // 使用newValue作为Y轴值，这样事件点会显示在对应的参数值位置
                const eventData = data.events.map((event, idx) => ({
                    name: event.operation || '操作',
                    value: [
                        event.timestamp,
                        event.newValue != null ? event.newValue : 0,  // 使用实际参数值作为Y轴
                        event.channelName || '',
                        event.description || '',
                        event.color || 'blue',
                        event.action || '记录',
                        event.oldValue,
                        event.newValue,
                        event.delta
                    ],
                    itemStyle: {
                        color: event.color === 'red' ? '#f5222d' : 
                               event.color === 'green' ? '#52c41a' : '#1890ff'
                    }
                }));
                
                // 构建ECharts配置
                const displayInfo = data.displayedEvents ? ` (显示${data.displayedEvents}/${data.totalEvents}个事件)` : '';
                const option = {
                    title: { 
                        text: `操作日志时间线 - 炮号 ${shotNo} - ${channel}${displayInfo}`,
                        left: 'center',
                        textStyle: { fontSize: 14 }
                    },
                    tooltip: {
                        trigger: 'axis',
                        axisPointer: { type: 'cross' }
                    },
                    legend: {
                        data: ['波形趋势', '参数调整'],
                        top: 30
                    },
                    grid: {
                        left: '8%',
                        right: '5%',
                        bottom: '15%',
                        top: '15%'
                    },
                    xAxis: {
                        type: 'time',
                        name: '时间',
                        axisLabel: {
                            formatter: function(value) {
                                const date = new Date(value);
                                return date.toLocaleTimeString('zh-CN', { 
                                    hour: '2-digit', 
                                    minute: '2-digit',
                                    second: '2-digit'
                                });
                            }
                        }
                    },
                    yAxis: {
                        type: 'value',
                        name: `${channel} 数值`,
                        scale: true  // 自动缩放Y轴
                    },
                    dataZoom: [
                        {
                            type: 'slider',
                            xAxisIndex: 0,
                            start: 0,
                            end: 100,
                            height: 20
                        },
                        {
                            type: 'inside',
                            xAxisIndex: 0
                        }
                    ],
                    series: []
                };
                
                // 添加波形线系列
                if (data.waveform && data.waveform.values && data.waveform.values.length > 0) {
                    const waveformData = data.waveform.timestamps.map((time, idx) => [
                        new Date(time).getTime(),  // 转换为时间戳
                        data.waveform.values[idx]
                    ]);
                    
                    option.series.push({
                        name: '波形趋势',
                        type: 'line',
                        data: waveformData,
                        sampling: 'lttb',
                        lineStyle: { width: 1.5, color: '#1890ff' },
                        areaStyle: {
                            color: {
                                type: 'linear',
                                x: 0, y: 0, x2: 0, y2: 1,
                                colorStops: [
                                    { offset: 0, color: 'rgba(24, 144, 255, 0.2)' },
                                    { offset: 1, color: 'rgba(24, 144, 255, 0.05)' }
                                ]
                            }
                        },
                        symbol: 'none',
                        smooth: true,
                        z: 1  // 波形在底层
                    });
                    
                    log(`✅ 波形数据: 原始采样率=${data.waveform.originalSampleRate}Hz, ` +
                        `下采样因子=${data.waveform.downsampleFactor}, ` +
                        `显示点数=${data.waveform.downsampledSamples}`);
                }
                
                // 添加操作事件散点系列
                if (eventData.length > 0) {
                    const scatterData = eventData.map(e => ({
                        ...e,
                        value: [
                            new Date(e.value[0]).getTime(),  // 转换为时间戳
                            e.value[1],  // Y轴值（参数值）
                            ...e.value.slice(2)
                        ]
                    }));
                    
                    option.series.push({
                        name: '参数调整',
                        type: 'scatter',
                        symbolSize: 12,
                        data: scatterData,
                        tooltip: {
                            formatter: function(params) {
                                const d = params.data.value;
                                const time = new Date(d[0]).toLocaleString('zh-CN');
                                return `<b>${params.data.name}</b><br/>` +
                                       `时间: ${time}<br/>` +
                                       `通道: ${d[2] || 'N/A'}<br/>` +
                                       `操作: <span style="color:${params.color}">${d[5]}</span><br/>` +
                                       `旧值: ${d[6] != null ? d[6].toFixed(4) : 'N/A'}<br/>` +
                                       `新值: ${d[7] != null ? d[7].toFixed(4) : 'N/A'}<br/>` +
                                       `变化: ${d[8] != null ? (d[8] > 0 ? '+' : '') + d[8].toFixed(4) : 'N/A'}`;
                            }
                        },
                        label: {
                            show: false
                        },
                        z: 2  // 散点在上层
                    });
                }
                
                timelineChart.setOption(option);
                log('✅ 增强时间线显示完成');
            } catch (error) {
                log(`⚠️ 加载时间线失败: ${error.message}`);
                timelineChart.setOption({
                    title: { 
                        text: `炮号 ${shotNo} - 加载失败`,
                        left: 'center',
                        textStyle: { fontSize: 14, color: '#999' }
                    }
                });
            }
        }
        
        // 页面加载时初始化
        window.addEventListener('load', () => {
            log('=== 页面加载完成 ===');
            log('初始化图表...');
            initChart();
            log('加载炮号列表...');
            loadShots();
        });

        // 窗口大小改变时重绘
        window.addEventListener('resize', () => {
            if (chart) chart.resize();
            if (timelineChart) timelineChart.resize();
        });
    </script>
</body>
</html>
