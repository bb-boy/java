<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波形数据展示系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #1890ff;
            margin-bottom: 10px;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .controls select, .controls button, .controls input {
            padding: 8px 16px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
        }

        .controls button {
            background: #1890ff;
            color: white;
            cursor: pointer;
            border: none;
        }

        .controls button:hover {
            background: #40a9ff;
        }

        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 10px;
        }

        .status.connected {
            background: #52c41a;
            color: white;
        }

        .status.disconnected {
            background: #ff4d4f;
            color: white;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(800px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid #1890ff;
            padding-bottom: 10px;
        }

        .chart {
            width: 100%;
            height: 400px;
        }

        .table-container {
            max-height: 400px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th, table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }

        table th {
            background: #fafafa;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        table tr:hover {
            background: #f5f5f5;
        }

        .metadata {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .metadata-item {
            padding: 10px;
            background: #fafafa;
            border-radius: 4px;
        }

        .metadata-item label {
            display: block;
            color: #666;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .metadata-item span {
            display: block;
            color: #333;
            font-size: 16px;
            font-weight: 500;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>波形数据展示系统</h1>
            <div class="controls">
                <label>炮号:</label>
                <select id="shotSelector">
                    <option value="">加载中...</option>
                </select>
                
                <label>通道:</label>
                <select id="channelSelector">
                    <option value="">请先选择炮号</option>
                </select>
                
                <label>数据源:</label>
                <select id="sourceSelector">
                    <option value="file">文件</option>
                    <option value="network">网络</option>
                </select>
                
                <button onclick="switchSource()">切换数据源</button>
                <button onclick="loadData()">加载数据</button>
                <button onclick="toggleWebSocket()">切换实时推送</button>
                
                <span class="status disconnected" id="wsStatus">WebSocket未连接</span>
            </div>
        </div>

        <div class="card">
            <h2>炮号元数据</h2>
            <div id="metadata" class="metadata">
                <div class="loading">请选择炮号</div>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>Tube波形数据</h2>
                <div id="tubeChart" class="chart"></div>
            </div>
            <div class="card">
                <h2>Water波形数据</h2>
                <div id="waterChart" class="chart"></div>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>操作日志</h2>
                <div class="table-container">
                    <table id="operationTable">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>操作类型</th>
                                <th>通道</th>
                                <th>旧值</th>
                                <th>新值</th>
                                <th>变化量</th>
                                <th>置信度</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="7" class="loading">暂无数据</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <h2>PLC互锁日志</h2>
                <div class="table-container">
                    <table id="plcTable">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>互锁名称</th>
                                <th>状态</th>
                                <th>当前值</th>
                                <th>阈值</th>
                                <th>描述</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="6" class="loading">暂无数据</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api/data';
        const WS_URL = 'http://localhost:8080/ws';
        
        let tubeChart, waterChart;
        let stompClient = null;
        let wsConnected = false;

        // 初始化图表
        function initCharts() {
            tubeChart = echarts.init(document.getElementById('tubeChart'));
            waterChart = echarts.init(document.getElementById('waterChart'));
            
            const option = {
                title: { text: '波形数据', left: 'center' },
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', name: '采样点' },
                yAxis: { type: 'value', name: '数值' },
                series: []
            };
            
            tubeChart.setOption(option);
            waterChart.setOption(option);
        }

        // 加载炮号列表
        async function loadShots() {
            try {
                const response = await fetch(`${API_BASE}/shots`);
                const shots = await response.json();
                
                const selector = document.getElementById('shotSelector');
                selector.innerHTML = shots.map(s => 
                    `<option value="${s}">${s}</option>`
                ).join('');
                
                if (shots.length > 0) {
                    loadChannels(shots[0]);
                }
            } catch (error) {
                console.error('加载炮号列表失败:', error);
            }
        }

        // 加载通道列表
        async function loadChannels(shotNo) {
            try {
                const response = await fetch(`${API_BASE}/shots/${shotNo}/channels?type=Tube`);
                const channels = await response.json();
                
                const selector = document.getElementById('channelSelector');
                selector.innerHTML = channels.map(c => 
                    `<option value="${c}">${c}</option>`
                ).join('');
            } catch (error) {
                console.error('加载通道列表失败:', error);
            }
        }

        // 加载完整数据
        async function loadData() {
            const shotNo = document.getElementById('shotSelector').value;
            if (!shotNo) return;

            try {
                const response = await fetch(`${API_BASE}/shots/${shotNo}/complete`);
                const data = await response.json();
                
                displayMetadata(data.metadata);
                displayWaveData(data.tubeWaveData, tubeChart, 'Tube');
                displayWaveData(data.waterWaveData, waterChart, 'Water');
                displayOperationLogs(data.operationLogs);
                displayPlcInterlocks(data.plcInterlocks);
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        // 显示元数据
        function displayMetadata(metadata) {
            if (!metadata) return;
            
            const html = `
                <div class="metadata-item">
                    <label>炮号</label>
                    <span>${metadata.shotNo}</span>
                </div>
                <div class="metadata-item">
                    <label>文件名</label>
                    <span>${metadata.fileName || '-'}</span>
                </div>
                <div class="metadata-item">
                    <label>开始时间</label>
                    <span>${metadata.startTime || '-'}</span>
                </div>
                <div class="metadata-item">
                    <label>结束时间</label>
                    <span>${metadata.endTime || '-'}</span>
                </div>
                <div class="metadata-item">
                    <label>预期时长</label>
                    <span>${metadata.expectedDuration ? metadata.expectedDuration + 's' : '-'}</span>
                </div>
                <div class="metadata-item">
                    <label>实际时长</label>
                    <span>${metadata.actualDuration ? metadata.actualDuration + 's' : '-'}</span>
                </div>
                <div class="metadata-item">
                    <label>采样率</label>
                    <span>${metadata.sampleRate ? metadata.sampleRate + ' Hz' : '-'}</span>
                </div>
                <div class="metadata-item">
                    <label>总采样数</label>
                    <span>${metadata.totalSamples || '-'}</span>
                </div>
                <div class="metadata-item">
                    <label>状态</label>
                    <span style="color: ${metadata.status === '正常完成' ? '#52c41a' : '#ff4d4f'}">${metadata.status || '-'}</span>
                </div>
            `;
            
            document.getElementById('metadata').innerHTML = html;
        }

        // 显示波形数据
        function displayWaveData(waveDataMap, chart, type) {
            if (!waveDataMap || Object.keys(waveDataMap).length === 0) {
                chart.setOption({
                    title: { text: `${type}波形数据 (暂无数据)` },
                    series: []
                });
                return;
            }

            const series = Object.entries(waveDataMap).map(([channel, waveData]) => ({
                name: channel,
                type: 'line',
                data: waveData.data || [],
                smooth: true,
                sampling: 'lttb',  // 大数据量采样
                symbolSize: 0
            }));

            chart.setOption({
                title: { text: `${type}波形数据` },
                legend: { data: Object.keys(waveDataMap), top: 30 },
                series: series
            });
        }

        // 显示操作日志
        function displayOperationLogs(logs) {
            const tbody = document.getElementById('operationTable').querySelector('tbody');
            
            if (!logs || logs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="loading">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = logs.map(log => `
                <tr>
                    <td>${log.timestamp || '-'}</td>
                    <td>${log.operationType || '-'}</td>
                    <td>${log.channelName || '-'}</td>
                    <td>${log.oldValue ? log.oldValue.toFixed(6) : '-'}</td>
                    <td>${log.newValue ? log.newValue.toFixed(6) : '-'}</td>
                    <td style="color: ${log.delta > 0 ? '#52c41a' : '#ff4d4f'}">
                        ${log.delta ? (log.delta > 0 ? '+' : '') + log.delta.toFixed(6) : '-'}
                    </td>
                    <td>${log.confidence ? log.confidence.toFixed(2) + 'σ' : '-'}</td>
                </tr>
            `).join('');
        }

        // 显示PLC互锁
        function displayPlcInterlocks(interlocks) {
            const tbody = document.getElementById('plcTable').querySelector('tbody');
            
            if (!interlocks || interlocks.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="loading">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = interlocks.map(plc => `
                <tr>
                    <td>${plc.timestamp || '-'}</td>
                    <td>${plc.interlockName || '-'}</td>
                    <td style="color: ${plc.status ? '#52c41a' : '#ff4d4f'}">
                        ${plc.status ? '正常' : '触发'}
                    </td>
                    <td>${plc.currentValue || '-'}</td>
                    <td>${plc.threshold || '-'}</td>
                    <td>${plc.description || '-'}</td>
                </tr>
            `).join('');
        }

        // WebSocket连接
        function connectWebSocket() {
            const socket = new SockJS(WS_URL);
            stompClient = Stomp.over(socket);
            
            stompClient.connect({}, (frame) => {
                console.log('WebSocket已连接:', frame);
                wsConnected = true;
                updateWsStatus();
                
                // 订阅炮号列表更新
                stompClient.subscribe('/topic/shots', (message) => {
                    console.log('收到炮号列表更新:', message.body);
                    loadShots();
                });
                
                // 订阅当前炮号的实时数据
                const shotNo = document.getElementById('shotSelector').value;
                if (shotNo) {
                    stompClient.subscribe(`/topic/shot/${shotNo}`, (message) => {
                        const data = JSON.parse(message.body);
                        console.log('收到实时数据:', data);
                        displayMetadata(data.metadata);
                    });
                }
            }, (error) => {
                console.error('WebSocket连接失败:', error);
                wsConnected = false;
                updateWsStatus();
            });
        }

        function disconnectWebSocket() {
            if (stompClient) {
                stompClient.disconnect();
                wsConnected = false;
                updateWsStatus();
            }
        }

        function toggleWebSocket() {
            if (wsConnected) {
                disconnectWebSocket();
            } else {
                connectWebSocket();
            }
        }

        function updateWsStatus() {
            const status = document.getElementById('wsStatus');
            if (wsConnected) {
                status.className = 'status connected';
                status.textContent = 'WebSocket已连接';
            } else {
                status.className = 'status disconnected';
                status.textContent = 'WebSocket未连接';
            }
        }

        // 切换数据源
        async function switchSource() {
            const source = document.getElementById('sourceSelector').value;
            try {
                const response = await fetch(`${API_BASE}/source/switch?source=${source}`, {
                    method: 'POST'
                });
                const result = await response.json();
                alert(result.message);
                loadShots();
            } catch (error) {
                console.error('切换数据源失败:', error);
                alert('切换数据源失败');
            }
        }

        // 事件监听
        document.getElementById('shotSelector').addEventListener('change', (e) => {
            loadChannels(e.target.value);
            loadData();
        });

        // 初始化
        window.addEventListener('load', () => {
            initCharts();
            loadShots();
        });

        // 窗口大小改变时重绘图表
        window.addEventListener('resize', () => {
            tubeChart.resize();
            waterChart.resize();
        });
    </script>
</body>
</html>
