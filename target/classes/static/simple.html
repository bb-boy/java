<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>简化测试</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; margin: 10px 0; border-radius: 8px; }
        .chart { width: 100%; height: 400px; border: 1px solid #ddd; }
        button { padding: 10px 20px; margin: 5px; background: #1890ff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #log { max-height: 200px; overflow-y: auto; background: #f5f5f5; padding: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>波形数据测试</h1>
        <button onclick="loadAndDisplay()">加载炮号1数据</button>
        <button onclick="document.getElementById('log').innerHTML=''">清空日志</button>
    </div>

    <div class="card">
        <h2>炮号元数据</h2>
        <div id="metadata">等待加载...</div>
    </div>

    <div class="card">
        <h2>波形图表</h2>
        <div id="chart" class="chart"></div>
    </div>

    <div class="card">
        <h2>时间线（3通道）</h2>
        <div id="timeline" class="chart" style="height: 500px;"></div>
    </div>

    <div class="card">
        <h3>日志</h3>
        <div id="log"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api/hybrid';
        let chart, timelineChart;

        function log(msg) {
            const logEl = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            logEl.innerHTML += `[${time}] ${msg}<br>`;
            logEl.scrollTop = logEl.scrollHeight;
            console.log(msg);
        }

        function initCharts() {
            chart = echarts.init(document.getElementById('chart'));
            timelineChart = echarts.init(document.getElementById('timeline'));
            log('✅ 图表初始化完成');
        }

        async function loadAndDisplay() {
            try {
                log('开始加载炮号1数据...');
                
                // 1. 加载炮号数据
                const shotRes = await fetch(`${API_BASE}/shot/1`);
                const shotData = await shotRes.json();
                log(`✅ 炮号数据: ${shotData.channelCount}个通道`);
                
                // 显示元数据
                const meta = shotData.metadata;
                document.getElementById('metadata').innerHTML = `
                    <p><strong>炮号:</strong> ${meta.shotNo}</p>
                    <p><strong>开始时间:</strong> ${meta.startTime || '-'}</p>
                    <p><strong>采样率:</strong> ${meta.sampleRate || '-'} Hz</p>
                `;
                
                // 2. 加载波形
                const waveRes = await fetch(`${API_BASE}/waveform?shotNo=1&channelName=NegVoltage`);
                const waveData = await waveRes.json();
                log(`✅ 波形数据: ${waveData.samples}个点`);
                
                chart.setOption({
                    title: { text: 'NegVoltage波形' },
                    tooltip: { trigger: 'axis' },
                    xAxis: { type: 'category', name: '采样点' },
                    yAxis: { type: 'value', name: '数值' },
                    series: [{
                        name: 'NegVoltage',
                        type: 'line',
                        data: waveData.data,
                        sampling: 'lttb',
                        symbol: 'none'
                    }]
                });
                
                // 3. 加载时间线
                const timelineRes = await fetch(`${API_BASE}/timeline/1`);
                const timelineData = await timelineRes.json();
                log(`✅ 时间线: ${timelineData.events.length}事件, ${timelineData.waveforms.length}波形`);
                
                const colors = ['#1890ff', '#52c41a', '#faad14'];
                const series = [];
                
                timelineData.waveforms.forEach((w, idx) => {
                    const data = w.timestamps.map((t, i) => [new Date(t).getTime(), w.values[i]]);
                    series.push({
                        name: w.channelName,
                        type: 'line',
                        data: data,
                        lineStyle: { color: colors[idx] },
                        symbol: 'none',
                        smooth: true
                    });
                });
                
                timelineChart.setOption({
                    title: { text: '时间线 - 3通道波形' },
                    tooltip: { trigger: 'axis' },
                    legend: { data: timelineData.waveforms.map(w => w.channelName) },
                    xAxis: { type: 'time' },
                    yAxis: { type: 'value', scale: true },
                    dataZoom: [{ type: 'slider' }, { type: 'inside' }],
                    series: series
                });
                
                log('✅ 所有数据加载完成！');
                
            } catch (error) {
                log(`❌ 错误: ${error.message}`);
                console.error(error);
            }
        }

        window.onload = () => {
            log('页面加载完成');
            initCharts();
            log('准备就绪，点击按钮加载数据');
        };
    </script>
</body>
</html>
