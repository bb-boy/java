<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>API测试</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        button { padding: 10px 20px; margin: 5px; }
        pre { background: #f5f5f5; padding: 10px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>API诊断测试</h1>
    
    <button onclick="testShots()">1. 测试炮号列表</button>
    <button onclick="testChannels()">2. 测试通道列表</button>
    <button onclick="testComplete()">3. 测试完整数据</button>
    <button onclick="clearLog()">清空日志</button>
    
    <h2>测试结果：</h2>
    <pre id="log"></pre>
    
    <script>
        const API_BASE = 'http://localhost:8080/api/data';
        
        function log(message, isError = false) {
            const logEl = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const className = isError ? 'error' : 'success';
            logEl.innerHTML += `<span class="${className}">[${timestamp}] ${message}</span>\n`;
        }
        
        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }
        
        async function testShots() {
            try {
                log('正在请求: GET /api/data/shots');
                const response = await fetch(`${API_BASE}/shots`);
                log(`响应状态: ${response.status} ${response.statusText}`);
                
                const data = await response.json();
                log(`✅ 成功获取 ${data.length} 个炮号`);
                log(`炮号列表: ${data.join(', ')}`);
            } catch (error) {
                log(`❌ 错误: ${error.message}`, true);
                console.error(error);
            }
        }
        
        async function testChannels() {
            try {
                const shotNo = 1;
                log(`正在请求: GET /api/data/shots/${shotNo}/channels?type=Tube`);
                const response = await fetch(`${API_BASE}/shots/${shotNo}/channels?type=Tube`);
                log(`响应状态: ${response.status} ${response.statusText}`);
                
                const data = await response.json();
                log(`✅ 炮号${shotNo}的Tube通道: ${data.length} 个`);
                log(`通道列表: ${data.join(', ')}`);
            } catch (error) {
                log(`❌ 错误: ${error.message}`, true);
                console.error(error);
            }
        }
        
        async function testComplete() {
            try {
                const shotNo = 1;
                log(`正在请求: GET /api/data/shots/${shotNo}/complete (可能需要几秒钟...)`);
                const startTime = Date.now();
                
                const response = await fetch(`${API_BASE}/shots/${shotNo}/complete`);
                const elapsed = ((Date.now() - startTime) / 1000).toFixed(2);
                log(`响应状态: ${response.status} ${response.statusText} (耗时: ${elapsed}秒)`);
                
                const data = await response.json();
                const tubeCount = Object.keys(data.tubeWaveData || {}).length;
                const waterCount = Object.keys(data.waterWaveData || {}).length;
                
                log(`✅ 炮号${shotNo}完整数据:`);
                log(`   - Tube波形: ${tubeCount} 个通道`);
                log(`   - Water波形: ${waterCount} 个通道`);
                log(`   - 元数据: ${data.metadata ? '有' : '无'}`);
                
                // 检查第一个通道的数据
                const firstTube = Object.values(data.tubeWaveData || {})[0];
                if (firstTube && firstTube.data) {
                    log(`   - 第一个Tube通道数据点数: ${firstTube.data.length}`);
                } else {
                    log(`   ⚠️ Tube通道数据为空`, true);
                }
            } catch (error) {
                log(`❌ 错误: ${error.message}`, true);
                console.error(error);
            }
        }
        
        // 页面加载时自动运行测试
        window.addEventListener('load', () => {
            log('=== 页面加载完成，开始自动测试 ===');
            setTimeout(testShots, 500);
        });
    </script>
</body>
</html>
